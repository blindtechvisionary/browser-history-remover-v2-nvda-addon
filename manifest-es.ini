name = browserHistoryRemover
summary = "Browser History Remover (V2)"
description = """Esta es la versión de próxima generación del complemento original Browser History Remover para NVDA, rediseñado para ofrecer una solución más robusta y eficiente en la gestión centralizada de datos del navegador.
Permite la eliminación automática del historial de navegación en múltiples navegadores web a través de una única interfaz accesible, eliminando la necesidad de interactuar manualmente con cada navegador.
El complemento es capaz de borrar el historial incluso cuando el usuario tiene una sesión activa en el navegador, asegurando que los datos locales se eliminen independientemente del estado de la cuenta.

Navegadores compatibles:
Google Chrome, Microsoft Edge, Mozilla Firefox, Opera, Brave, Vivaldi, Chromium, Waterfox, Pale Moon, Basilisk y SeaMonkey.

Se puede acceder al complemento mediante el atajo de teclado NVDA+Alt+B, o a través del Menú NVDA → Herramientas.
Desarrollado por: Sujan Rai."""
